<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Cloudix Store</title><link rel="stylesheet" href="/static/styles.css"><script src="https://telegram.org/js/telegram-web-app.js"></script></head><body><div class="bg-orbs" aria-hidden="true"><span></span><span></span><span></span><span></span></div><main class="app"><section class="screen center active" id="ageScreen"><div class="glass hero-card"><div class="brand-glow">CLOUDIX STORE</div><p class="age-text" data-i18n="ageText">Входя в приложение, вы подтверждаете, что вам исполнилось 18 лет.</p><button class="primary big" id="ageBtn" data-i18n="ageBtn">Мне есть 18+</button></div></section><section class="screen center" id="passwordScreen"><div class="glass pass-card"><h1 data-i18n="passwordTitle">Введите пароль для входа в приложение</h1><input id="passwordInput" type="password" autocomplete="off" placeholder="••••••••••"><p class="error" id="passwordError"></p><button class="primary big" id="loginBtn" data-i18n="loginBtn">Войти</button></div></section><section class="screen" id="catalogScreen"><header class="catalog-head"><div><h2 data-i18n="catalogTitle">КАТАЛОГ</h2><p data-i18n="categoriesTitle">Категории:</p></div><div class="lang-switch"><button class="lang active" data-lang="ru">RU</button><span>/</span><button class="lang" data-lang="pl">PL</button></div></header><nav class="categories"><button class="cat active" data-category="Жидкости" data-i18n="catLiquids">ЖИДКОСТИ</button><button class="cat" data-category="Одноразки" data-i18n="catDisposables">ОДНОРАЗКИ</button><button class="cat" data-category="Поды" data-i18n="catPods">ПОДЫ</button></nav><section class="product-section"><div class="section-row"><h3 id="sectionTitle">ЖИДКОСТИ</h3><button class="cart-pill" id="cartBtn"><span data-i18n="cart">Корзина</span> <b id="cartCount">0</b></button></div><div id="catalog" class="products"></div></section></section><section class="screen" id="detailScreen"><button class="back-btn" id="backToCatalog" data-i18n="back">Назад</button><article class="glass detail-card"><p class="tag" id="detailCategory"></p><h2 id="detailName"></h2><p class="detail-strength" id="detailStrength"></p><div class="detail-price" id="detailPrice"></div><p class="muted" id="detailDesc"></p><h3 data-i18n="chooseFlavor">Выберите вкус</h3><div id="detailFlavors" class="flavors"></div><button class="primary big" id="addToCart" data-i18n="addToCart">Добавить в корзину</button></article></section><section class="screen" id="cartScreen"><div class="section-row"><h2 data-i18n="cartTitle">КОРЗИНА</h2><button class="back-btn" id="backFromCart" data-i18n="back">Назад</button></div><div class="glass cart-panel"><div id="cartItems"></div><div class="total"><span data-i18n="total">Итого:</span> <b id="total">0 zł</b></div><form id="orderForm" class="form"><label><span data-i18n="name">Имя</span><input name="name" required></label><label><span data-i18n="username">Ник Telegram</span><input name="username" id="username" readonly></label><label><span data-i18n="phone">Телефон</span><input name="phone" required></label><label><span data-i18n="delivery">Способ получения</span><select name="delivery_type" id="delivery"><option value="pickup">Самовывоз — Величка</option><option value="city_delivery">Доставка по городу — 15 zł</option><option value="other_city_delivery">Доставка по Польше — 20 zł</option></select></label><label><span data-i18n="city">Город</span><input name="city" id="city" required value="Величка"></label><label><span data-i18n="address">Адрес</span><input name="address"></label><label><span data-i18n="comment">Комментарий</span><textarea name="comment"></textarea></label><button class="primary big" type="submit" data-i18n="createOrder">Создать заказ</button></form></div></section><section class="screen center" id="payScreen"><div class="glass pay-card"><p class="tag">PAYMENT</p><h2 data-i18n="payment">Оплата</h2><p id="paymentText" class="muted"></p><p><span data-i18n="orderNumber">Номер заказа:</span> <b id="orderId"></b></p><p data-i18n="sendScreenshot">После оплаты отправь в чат бота фото скрина с подписью:</p><code id="payCommand"></code><button id="closeBtn" class="primary big" data-i18n="done">Готово</button></div></section></main><script src="/static/app.js"></script></body></html>
